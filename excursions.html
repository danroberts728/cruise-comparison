<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Princess Cruises Excursions &ndash; N717</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2e5a;
      --blue: #0057a8;
      --blue-light: #e8f1fb;
      --gold: #c9973a;
      --gold-light: #fef6e6;
      --green: #2e7d52;
      --green-light: #e6f4ec;
      --red: #b94040;
      --red-light: #fbeaea;
      --text: #1c1c1e;
      --text-muted: #5a5a6a;
      --border: #dde3ed;
      --surface: #f4f6fb;
      --card: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    .site-header {
      background: var(--navy);
      color: #fff;
      padding: 20px 24px;
    }
    .site-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .site-header p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }

    .page-layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .page-layout { grid-template-columns: 1fr; }
    }

    .sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: sticky;
      top: 16px;
    }
    .sidebar h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .filter-group { margin-bottom: 20px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group label.group-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text);
    }
    .filter-option input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
    }
    .filter-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 9999px;
      padding: 1px 7px;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }
    .clear-btn:hover { background: var(--surface); color: var(--text); }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-count { font-size: 0.875rem; color: var(--text-muted); }
    .results-count strong { color: var(--text); }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

    .card-summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      user-select: none;
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 9999px;
      background: var(--gold-light);
      color: var(--gold);
      white-space: nowrap;
      align-self: center;
      flex-shrink: 0;
    }

    .card-meta {

      flex-wrap: wrap;
      gap: 6px 14px;

      color: var(--text-muted);

    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meta-item svg { flex-shrink: 0; opacity: 0.65; }

    .card-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 9999px;
    }
    .chip-meal { background: var(--green-light); color: var(--green); }
    .chip-shopping { background: var(--blue-light); color: var(--blue); }
    .chip-easy { background: #e8f5e8; color: #2e7d32; }
    .chip-moderate { background: #fff8e1; color: #b45309; }
    .chip-strenuous { background: var(--red-light); color: var(--red); }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
      min-width: 110px;
    }
    .price-block { text-align: right; }
    .card-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
    }
    .card-price-label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .card-rating {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 3px;
    }
    .expand-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background 0.15s, transform 0.2s;
      flex-shrink: 0;
    }
    .card.expanded .expand-btn {
      transform: rotate(180deg);
      background: var(--blue-light);
      color: var(--blue);
      border-color: var(--blue);
    }

    .card-details {
      display: none;
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .card.expanded .card-details { display: block; }

    .detail-section { margin-bottom: 14px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .detail-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.65;
    }

    .princess-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--blue);
      border-radius: 6px;
      margin-top: 14px;
      transition: background 0.15s;
    }
    .princess-link:hover { background: var(--blue-light); }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.35; }
    .empty-state p { font-size: 1rem; margin-bottom: 4px; }
    .empty-state small { font-size: 0.85rem; }
  </style>
</head>

 Accessible":"No","Shopping":"Yes","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Embark on an adventure of epic proportions! Hike to the summit of Mt. Vesuvius for incredible views of the volcano's crater and the Bay of Naples. You'll also see the violent side of a volcano on a 2-hour tour of the ruins of Pompeii-the city buried in a cataclysmic eruption by this force of nature ","Special Notes":"In case weather conditions close the Mt. Vesuvius site, an orientation drive of Naples will be done in place of the hike. This tour involves extensive walking over uneven terrain. Caution is advised when walking across hardened lava and rocky ground where crevices still exude fumes and heat. Passengers with a history of heart disease or high blood pressure should not participate. Passengers should wear low-healed comfortable walking shoes, hat, and bring sunblock. Please note this tour does not "},{"ID":"SL3-315","Name":"Mozzarella Tasting & Paestum Excavations","Port":"Amalfi Coast (Salerno)","Category":"CULINARY & BEVERAGE","Duration (hrs)":5,"Activity Level":"Strenuous","Meal Included":"Yes","Food Service":"Includes snack","Price":"$159.95","Rating":"4.9/5 (17 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"Discover the traditional Campania D.O.P. buffalo mozzarella being made and then you will taste their dairy products. Drive south to the archeological site of Paestum over 2,500 years ago which was ideal for farming. Located in the eastern part of the Gulf of Salerno to 10 km from the mouth of the ri","Special Notes":"Guests must be able to walk approximately 1.5 miles over uneven and cobblestone surfaces with a few steps at the farmhouse. Comfortable walking shoe and hat are recommended. Paestum is not wheelchair accessible.  The drive between Salerno and mozzarella diary is approx. 45 mins, between mozzarella diary and Paestum is approximately 15 minutes and the return drive from Paestum to Salerno is approximately 1 hr and 15 minutes, dependent on traffic conditions.  Tour itinerary may be reversed but all"},{"ID":"SL3-280","Name":"Panoramic Naples, Pizza Lunch and Time on your own","Port":"Amalfi Coast (Salerno)","Category":"CULTURE & HISTORY","Duration (hrs)":7,"Activity Level":"Moderate","Meal Included":"Yes","Food Service":"Includes meal","Price":"$169.95","Rating":"No ratings","Wheelchair Accessible":"No","Shopping":"Yes","Passport Required":"No","Badge":null,"Short Description":"Take your tastebuds back to the 18th century when pizza was invented. Originally sold as a simple street food, Neapolitan pizza is now one of the world's most iconic foods; in fact, it's on UNESCO'S Intangible Cultural Heritage list! Once in Naples, your coach will head to Piazza Garibaldi, the bust","Special Notes":"Wear comfortable walking shoes, sunscreen and head cover. Some walking on uneven surfaces is included from bus drop-off point to Piazza Plebiscito and vice versa. Additional walking during the free time is at guests' discretion."},{"ID":"SL3-200","Name":"Pompeii","Port":"Amalfi Coast (Salerno)","Category":"CULTURE & HISTORY","Duration (hrs)":4,"Activity Level":"Strenuous","Meal Included":"No","Food Service":null,"Price":"$149.95 - $184.95","Rating":"4.3/5 (67 reviews)","Wheelchair Accessible":"No","Shopping":"Yes","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Your tour departs from Salerno where you'll board a motorcoach to Pompeii. Upon arriving at Pompeii, your knowledgeable guide will escort you on a tour of the excavations that were once buried beneath the ashes when Mt. Vesuvius erupted in 79 AD. Afterwards, you'll have an opportunity to stop at a c","Special Notes":"Use of an audio headset (included) will enhance your tour experience. For security reasons, it is forbidden to enter inside Pompeii excavations with big bags, backpacks or trolleys. Please be aware that, since lockers are not available, it is recommended to leave them inside the coach."},{"ID":"SL3-110","Name":"Pompeii & Amalfi Coastal Cruise","Port":"Amalfi Coast (Salerno)","Category":"CULTURE & HISTORY","Duration (hrs)":8,"Activity Level":"Strenuous","Meal Included":"Yes","Food Service":"Includes meal","Price":"$249.95 - $309.95","Rating":"4.3/5 (12 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Experience the spectacular Amalfi coast from the brilliant blue Mediterranean. Cruise along the scenic coastline with its majestic rock formations and lush grottos on a roundtrip cruise from Salerno to Amalfi. Afterwards, you'll drive from Salerno to Pompeii for an authentic Italian lunch at a local","Special Notes":"This tour will not operate in December.  In case of bad weather conditions and rough sea, the motorboat ride will be cancelled and the visit of Sorrento will be made instead. The vessel used may vary in size and capacity, and have inside or outside seating.  The drive from Salerno to Pompeii takes approximately 45 minutes. Passengers who suffer from motion sickness should take this into consideration. For security reasons, it is forbidden to enter inside Pompeii excavations with big bags, backpa"},{"ID":"SL3-180","Name":"Pompeii & Time On Your Own In Sorrento","Port":"Amalfi Coast (Salerno)","Category":"SIGHTSEEING: On Your Own","Duration (hrs)":8,"Activity Level":"Strenuous","Meal Included":"No","Food Service":null,"Price":"$199.95 - $249.95","Rating":"4.0/5 (31 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Embark on a tour of two cities-one, a delightful modern-day tourist destination, the other, an ancient resort tragedy. Spend time sightseeing, shopping and strolling in Sorrento. Then embark on a guided walking tour of the ruins of Pompeii, a UNESCO World Heritage Site. Enjoy approximately 2 1/2 hou","Special Notes":"Due to earlier closure of Pompeii excavations during the months of November and December, the visit of Sorrento will be made in the afternoon and shops might be closed. The drive from Salerno to Sorrento takes approximately 1 1/2 hours; the drive from Sorrento to Pompeii takes approximately one hour. Due to traffic restrictions of the Sorrento center, a short walk from the motorcoach drop off point to the main center and vice versa will be required. Use of an audio headset (included) will enhanc"},{"ID":"SL3-185","Name":"Pompeii On Your Own","Port":"Amalfi Coast (Salerno)","Category":"SIGHTSEEING: On Your Own","Duration (hrs)":4,"Activity Level":"Strenuous","Meal Included":"No","Food Service":null,"Price":"$109.95 - $134.95","Rating":"4.0/5 (13 reviews)","Wheelchair Accessible":"No","Shopping":"Yes","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Designed for those who enjoy seeing the sights at their own pace, explore the UNESCO World Heritage Site of Pompeii, one of the most famous excavations in the world, independently on this half-day adventure. Entrance fees and headset rentals are not included with this tour. Please bring local curren","Special Notes":"This is an \"On Your Own\" tour. This tour does not include a guide on the bus or guide inside Pompeii. Only one escort on the bus will be provided. The entrance fees and headsets for Pompeii excavations are also not included, and guests should bring local currency or credit cards. If guests should miss the return bus, transportation back to the vessel is your own responsibility and expense. Guests who prefer a more comprehensive, guided experience should book tour SL3-200 \"Pompeii.\" Walking insid"},{"ID":"SL3-905","Name":"Salerno By Private Vehicle - Car Class Full Day (With Guide)","Port":"Amalfi Coast (Salerno)","Category":"SPECIAL INTEREST: Private","Duration (hrs)":8,"Activity Level":"Easy","Meal Included":"No","Food Service":null,"Price":"$1499.95","Rating":"No ratings","Wheelchair Accessible":"No","Shopping": ","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"Explore at your own pace with a private minivan vehicle, driver and English-speaking guide at your service.","Special Notes":"Private minivans are ordered per vehicle (not per person), so only one person in the party needs to order the vehicle. The price shown is the total cost for the vehicle, driver, and English-speaking guide. Entrance fees for attractions are not included. In many destinations, the number of vehicles available is extremely limited, so guests are encouraged to secure their private vehicle reservation as early as possible. Private vehicles are not permitted to travel to the island of Capri. IMPORTANT"},{"ID":"SL3-365","Name":"Salerno Uncorked","Port":"Amalfi Coast (Salerno)","Category":"CULINARY & BEVERAGE","Duration (hrs)":3.5,"Activity Level":"Moderate","Meal Included":"Yes","Food Service":"Includes snack","Price":"$139.95","Rating":"No ratings","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"Whether you're a seasoned wine enthusiast or a complete novice, a tour and tasting is the ideal way to discover the subtle and complex flavors of wine. The historic family-run winery is renowned for its passion for producing exceptional wines with traditional methods and handpicked local grapes. Fro","Special Notes":"Moderate walking is included during the visit of the vineyards. Wear comfortable walking shoes, bring sunglasses and head cover. Euros and credit cards are accepted for purchase at the winery. The minimum age to drink wine is 18."},{"ID":"SL3-380","Name":"Salerno Walking Tour","Port":"Amalfi Coast (Salerno)","Category":"CULTURE & HISTORY","Duration (hrs)":2.5,"Activity Level":"Moderate","Meal Included":"Yes","Food Service":"Includes snack","Price":"$69.95","Rating":"No ratings","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"When Salerno became the capital of the Norman Empire from 1077 to 1127, great care was made to define the city with a number of architectural delights, which can be seen in the city's medieval quarter. Known locally as Centro Storico, the historic heart of the city is characterized by its narrow str","Special Notes":"The tour runs entirely on foot. Wear comfortable walking shoes, sunscreen and head cover. The tour may operate in reverse order. Headsets (included) will enhance your experience. This is a walking tour and therefore extended walking is included. Some uphill walking is included in order to reach Salerno Cathedral.  No bare shoulders or skirts / shorts are allowed inside the Cathedral. Note that the crypt is closed on Sundays and during Mass (especially on Saturdays and Sundays); in these cases, t"},{"ID":"SL3-120","Name":"Sorrento & Amalfi Cruise","Port":"Amalfi Coast (Salerno)","Category":"CULTURE & HISTORY","Duration (hrs)":8.45,"Activity Level":"Moderate","Meal Included":"Yes","Food Service":"Includes meal","Price":"$229.95 - $284.95","Rating":"4.1/5 (8 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"Experience the stunning beauty of the Amalfi coast from the sparkling Mediterranean. Cruise along the coastline with its majestic rock formations and lush grottos on a roundtrip cruise from Salerno to Amalfi. Afterwards, you'll drive from Salerno to the coastal resort town of Sorrento for an authent","Special Notes":"The drive from Salerno to the Sorrento takes approximately 90 minutes; the drive from Sorrento to Salerno takes approximately 90 minutes. Tour may operate in reverse order. Due to traffic restrictions of the Sorrento center a short walk from the motorcoach drop off point to the main center and vice versa will be required. Passengers who suffer from motion sickness should take the motorboat ride into consideration. In case of inclement weather and rough seas, the motorboat ride may be substituted"},{"ID":"SL3-285","Name":"Sorrento On Your Own","Port":"Amalfi Coast (Salerno)","Category":"SIGHTSEEING: On Your Own","Duration (hrs)":7,"Activity Level":"Easy","Meal Included":"No","Food Service":null,"Price":"$99.95 - $124.95","Rating":"4.4/5 (49 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":null,"Short Description":"Sorrento, the seaside town that lured Ulysses with its siren song, offers the quintessential Italian experience. Spend time exploring independently, taking in all the splendors this lemon-scented enclave has to offer. Board the motorcoach and travel 1 1/2 hours along the coastline for views of the B","Special Notes":"The drive from Salerno to Sorrento takes approximately 1 1/2 hours each way. Due to traffic restrictions of the Sorrento center, a short walk from the motorcoach drop off point to the main center and vice versa will be required."},{"ID":"SL3-150","Name":"Ultimate Bay of Naples: Pompeii, Positano & Amalfi Coast","Port":"Amalfi Coast (Salerno)","Category":"SIGHTSEEING: Ultimate","Duration (hrs)":9.5,"Activity Level":"Strenuous","Meal Included":"Yes","Food Service":"Includes meal","Price":"$394.95 - $494.95","Rating":"4.6/5 (11 reviews)","Wheelchair Accessible":"No","Shopping":"No","Passport Required":"No","Badge":"Guest Favorite","Short Description":"Driving along the Amalfi Coast and take a tour of the picturesque town built into a sheer cliff, Positano, The whitewashed pastel houses that line the rock face have been the subject of myriad postcards and photos. Enjoy the views from a caf\u00e9 or take the opportunity to shop. The next leg of your tou","Special Notes":"Roads on the Amalfi Coast are narrow and winding. Passengers who suffer from motion sickness should take this into consideration. Use of an audio headset (included) will enhance your tour experience. Tour may operate in reverse order For security reasons, it is forbidden to enter inside Pompeii excavations with big bags, backpacks or trolleys. Please be aware that, since lockers are not available, it is recommended to leave them inside the coach."}];

document.getElementById('total-count').textContent = EXCURSIONS.length;

const PORT_LABELS = {
  "Kusadasi, Turkey (for Ephesus)": "Kusadasi (Ephesus), Turkey",
  "Civitavecchia (for Rome), Italy": "Civitavecchia (Rome), Italy",
  "Katakolon (for Olympia), Greece": "Katakolon (Olympia), Greece",
  "Amalfi Coast (Salerno)": "Amalfi Coast, Salerno",
  "Santorini, Greece": "Santorini, Greece"
};

const state = { ports: new Set(), activities: new Set(), meals: new Set() };

function buildFilters() {
  const ports = [...new Set(EXCURSIONS.map(e => e.Port))].sort();
  renderGroup("port-filter-group", ports, "port", v => PORT_LABELS[v] || v);
  renderGroup("activity-filter-group", ["Easy", "Moderate", "Strenuous"], "activity");
  renderGroup("meal-filter-group", ["Yes", "No"], "meal", v => v === "Yes" ? "Meal included" : "No meal");
}

function renderGroup(groupId, values, key, labelFn) {
  const group = document.getElementById(groupId);
  values.forEach(val => {
    const count = EXCURSIONS.filter(e => getField(e, key) === val).length;
    const opt = document.createElement("label");
    opt.className = "filter-option";
    const safeId = "f-" + key + "-" + val.replace(/[^a-z0-9]/gi, "_");
    opt.innerHTML =
      '<input type="checkbox" id="' + safeId + '" data-filter="' + key + '" data-value="' + val + '" />' +
      '<span>' + (labelFn ? labelFn(val) : esc(val)) + '</span>' +
      '<span class="filter-count">' + count + '</span>';
    opt.querySelector("input").addEventListener("change", onFilterChange);
    group.appendChild(opt);
  });
}

function getField(e, key) {
  if (key === "port") return e.Port;
  if (key === "activity") return e["Activity Level"];
  if (key === "meal") return e["Meal Included"];
}

function onFilterChange(ev) {
  const { filter, value } = ev.target.dataset;
  const s = { port: state.ports, activity: state.activities, meal: state.meals }[filter];
  ev.target.checked ? s.add(value) : s.delete(value);
  renderCards();
}

function clearFilters() {
  state.ports.clear(); state.activities.clear(); state.meals.clear();
  document.querySelectorAll(".filter-option input").forEach(cb => cb.checked = false);
  renderCards();
}

function getFiltered() {
  return EXCURSIONS.filter(e => {
    if (state.ports.size > 0 && !state.ports.has(e.Port)) return false;
    if (state.activities.size > 0 && !state.activities.has(e["Activity Level"])) return false;
    if (state.meals.size > 0 && !state.meals.has(e["Meal Included"])) return false;
    return true;
  });
}

function activityChip(level) {
  const cls = { Easy: "chip-easy", Moderate: "chip-moderate", Strenuous: "chip-strenuous" }[level] || "";
  return '<span class="chip ' + cls + '">' + esc(level) + '</span>';
}

function renderCards() {
  const filtered = getFiltered();
  const list = document.getElementById("card-list");
  const empty = document.getElementById("empty-state");
  document.getElementById("showing-count").textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  list.innerHTML = filtered.map((e, i) => {
    const mealChip = e["Meal Included"] === "Yes"
      ? '<span class="chip chip-meal">' +
        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>' +
        'Meal Included</span>' : "";

    const shopChip = e.Shopping === "Yes"
      ? '<span class="chip chip-shopping">' +
        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>' +
        'Shopping</span>' : "";

    const badgeHtml = e.Badge
      ? '<span class="badge">' + esc(e.Badge) + '</span>' : "";

    const desc = e["Short Description"]
      ? '<div class="detail-section"><div class="detail-label">About</div><div class="detail-text">' + esc(e["Short Description"]) + '</div></div>' : "";

    const notes = e["Special Notes"]
      ? '<div class="detail-section"><div class="detail-label">Special Notes</div><div class="detail-text">' + esc(e["Special Notes"]) + '</div></div>' : "";

    const url = "https://www.princess.com/booking/addon/product/" + esc(e.ID);
    const rating = e.Rating || "No ratings";

    return (
      '<div class="card" id="card-' + i + '">' +
        '<div class="card-summary" onclick="toggleCard(' + i + ')">' +
          '<div class="card-left">' +
            '<div class="card-title-row">' +
              '<span class="card-name">' + esc(e.Name) + '</span>' + badgeHtml +
            '</div>' +
            '<div class="card-meta">' +
              '<span class="meta-item">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
                esc(PORT_LABELS[e.Port] || e.Port) +
              '</span>' +
              '<span class="meta-item">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
                esc(e.Category) +
              '</span>' +
              '<span class="meta-item">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                e["Duration (hrs)"] + ' hrs' +
              '</span>' +
              '<span class="meta-item">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' +
                esc(rating) +
              '</span>' +
            '</div>' +
            '<div class="card-chips">' + activityChip(e["Activity Level"]) + mealChip + shopChip + '</div>' +
          '</div>' +
          '<div class="card-right">' +
            '<div class="price-block">' +
              '<div class="card-price">' + esc(e.Price) + '</div>' +
              '<div class="card-price-label">per person</div>' +
            '</div>' +
            '<div class="expand-btn">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-details">' +
          desc + notes +
          '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="princess-link" onclick="event.stopPropagation()">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            'View on Princess.com (' + esc(e.ID) + ')' +
          '</a>' +
        '</div>' +
      '</div>'
    );
  }).join("");
}

function toggleCard(i) {
  const card = document.getElementById("card-" + i);
  card.classList.toggle("expanded");
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

buildFilters();
renderCards();
</script>
</body>
</html>
